<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍐 Little Fig</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui'], mono: ['JetBrains Mono', 'monospace'] },
      colors: { fig: { 50:'#ecfdf5', 100:'#d1fae5', 200:'#a7f3d0', 300:'#6ee7b7', 400:'#34d399', 500:'#10b981', 600:'#059669', 700:'#047857', 800:'#065f46', 900:'#064e3b', 950:'#022c22' }},
    }
  }
}
</script>
<script>
  // Anti-flash: apply dark before paint
  (function(){
    let t = localStorage.getItem('fig-theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.classList.replace('light','dark');
  })();
</script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .msg-user { background: linear-gradient(135deg, #059669, #10b981); }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
  .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
  @keyframes pulse-dot { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .typing-dot { animation: pulse-dot 1.4s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen flex overflow-hidden transition-colors duration-200">

<!-- ═══ SIDEBAR ═══ -->
<aside id="sidebar" class="w-72 h-full flex flex-col border-r border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 flex-shrink-0">
  <!-- Logo -->
  <div class="px-5 pt-5 pb-3 flex items-center gap-3">
    <span class="text-3xl">🍐</span>
    <div>
      <h1 class="text-lg font-extrabold text-fig-600 dark:text-fig-400 leading-tight">Little Fig</h1>
      <p class="text-[0.65rem] font-medium text-slate-400 dark:text-slate-500">v0.5 · Fig Engine</p>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-4 pb-4 scrollbar-thin space-y-4">
    <!-- Model -->
    <div>
      <label class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Model</label>
      <input id="model-input" type="text" placeholder="HuggingFace ID or local path…"
        class="mt-1 w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-fig-500 focus:border-transparent outline-none transition"
      >
      <p class="text-[0.6rem] text-slate-400 mt-1">e.g. Qwen/Qwen2.5-0.5B-Instruct</p>
      <div class="flex gap-2 mt-2">
        <button id="load-btn" class="flex-1 px-3 py-1.5 text-xs font-semibold rounded-lg bg-fig-600 hover:bg-fig-700 text-white transition">Load</button>
        <button id="unload-btn" class="px-3 py-1.5 text-xs font-semibold rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Unload</button>
      </div>
      <div id="model-status" class="mt-2"></div>
    </div>

    <!-- Parameters -->
    <details open>
      <summary class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 cursor-pointer select-none">Parameters</summary>
      <div class="mt-2 space-y-3">
        <div>
          <div class="flex justify-between text-xs text-slate-500"><span>Temperature</span><span id="temp-val" class="font-mono">0.7</span></div>
          <input id="temperature" type="range" min="0.01" max="2" step="0.05" value="0.7" class="w-full h-1.5 accent-fig-500 mt-1">
        </div>
        <div>
          <div class="flex justify-between text-xs text-slate-500"><span>Max tokens</span><span id="maxtok-val" class="font-mono">512</span></div>
          <input id="max-tokens" type="range" min="64" max="4096" step="64" value="512" class="w-full h-1.5 accent-fig-500 mt-1">
        </div>
        <div>
          <div class="flex justify-between text-xs text-slate-500"><span>Top-P</span><span id="topp-val" class="font-mono">0.9</span></div>
          <input id="top-p" type="range" min="0.01" max="1" step="0.05" value="0.9" class="w-full h-1.5 accent-fig-500 mt-1">
        </div>
      </div>
    </details>

    <!-- System Prompt -->
    <details>
      <summary class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 cursor-pointer select-none">System Prompt</summary>
      <textarea id="system-prompt" rows="3" class="mt-2 w-full px-3 py-2 text-xs rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 resize-none outline-none focus:ring-2 focus:ring-fig-500">You are a helpful, concise AI assistant.</textarea>
    </details>

    <!-- Hardware -->
    <div>
      <label class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Hardware</label>
      <div id="hw-badge" class="mt-1 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-fig-50 dark:bg-fig-950 text-fig-600 dark:text-fig-400 text-[0.7rem] font-mono font-medium">
        Loading…
      </div>
    </div>
  </div>

  <!-- Bottom: theme toggle -->
  <div class="px-4 py-3 border-t border-slate-200 dark:border-slate-800">
    <button id="theme-toggle" class="w-full px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center gap-2">
      <span id="theme-icon">🌙</span> <span id="theme-label">Dark mode</span>
    </button>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="flex-1 flex flex-col h-full">
  <!-- Chat messages -->
  <div id="chat-messages" class="flex-1 overflow-y-auto px-6 py-4 scrollbar-thin">
    <!-- Empty state -->
    <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center">
      <p class="text-5xl mb-4">🍐</p>
      <h2 class="text-xl font-bold text-fig-600 dark:text-fig-400">Little Fig</h2>
      <p class="text-sm text-slate-400 dark:text-slate-500 mt-2 max-w-xs">Load a model from the sidebar, then start chatting. Supports text, images, and files.</p>
    </div>
  </div>

  <!-- Input area -->
  <div class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 py-3">
    <div class="max-w-3xl mx-auto flex items-end gap-2">
      <!-- File upload -->
      <label class="cursor-pointer p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-400 hover:text-slate-600 dark:hover:text-slate-300" title="Attach files">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
        <input id="file-input" type="file" multiple accept="image/*,audio/*,.pdf,.txt,.py,.json,.csv" class="hidden">
      </label>
      <!-- Text input -->
      <div class="flex-1 relative">
        <div id="file-preview" class="hidden flex flex-wrap gap-1 mb-1"></div>
        <textarea id="chat-input" rows="1" placeholder="Message Little Fig…"
          class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 resize-none outline-none focus:ring-2 focus:ring-fig-500 focus:border-transparent transition max-h-32"
        ></textarea>
      </div>
      <!-- Send -->
      <button id="send-btn" class="p-2.5 rounded-xl bg-fig-600 hover:bg-fig-700 text-white transition disabled:opacity-40 disabled:cursor-not-allowed" title="Send">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// Little Fig Frontend — Vanilla JS (no build step needed)
// ═══════════════════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

// State
let ws = null;
let history = [];
let streaming = false;
let attachedFiles = [];

// ── Theme Toggle ─────────────────────────────────────────────────────────────
$('#theme-toggle').addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark');
  html.classList.toggle('dark', !isDark);
  html.classList.toggle('light', isDark);
  localStorage.setItem('fig-theme', isDark ? 'light' : 'dark');
  $('#theme-icon').textContent = isDark ? '🌙' : '☀️';
  $('#theme-label').textContent = isDark ? 'Dark mode' : 'Light mode';
});
// Init theme label
if (document.documentElement.classList.contains('dark')) {
  $('#theme-icon').textContent = '☀️';
  $('#theme-label').textContent = 'Light mode';
}

// ── Slider values ────────────────────────────────────────────────────────────
$('#temperature').addEventListener('input', e => $('#temp-val').textContent = e.target.value);
$('#max-tokens').addEventListener('input', e => $('#maxtok-val').textContent = e.target.value);
$('#top-p').addEventListener('input', e => $('#topp-val').textContent = e.target.value);

// ── Hardware info ────────────────────────────────────────────────────────────
fetch('/api/health').then(r => r.json()).then(data => {
  const hw = data.hardware;
  const badge = hw.gpu
    ? `⚡ ${hw.gpu} · ${hw.gpu_vram_gb}GB`
    : `💻 CPU · ${hw.cpu_cores} cores · ${hw.ram_available_gb}GB free`;
  $('#hw-badge').textContent = badge;
  if (data.model_loaded) {
    showStatus('ready', data.model_loaded.split('/').pop());
    $('#model-input').value = data.model_loaded;
  }
}).catch(() => { $('#hw-badge').textContent = '⚠ Server unreachable'; });

// ── Model Load/Unload ────────────────────────────────────────────────────────
function showStatus(type, text) {
  const colors = {
    ready: 'bg-fig-100 dark:bg-fig-950 text-fig-700 dark:text-fig-400',
    empty: 'bg-amber-100 dark:bg-amber-950 text-amber-700 dark:text-amber-400',
    error: 'bg-red-100 dark:bg-red-950 text-red-700 dark:text-red-400',
    loading: 'bg-blue-100 dark:bg-blue-950 text-blue-700 dark:text-blue-400',
  };
  const icons = { ready: '✓', empty: '○', error: '✗', loading: '⟳' };
  $('#model-status').innerHTML = `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[0.7rem] font-semibold ${colors[type]}">${icons[type]} ${text}</span>`;
}

$('#load-btn').addEventListener('click', async () => {
  const modelId = $('#model-input').value.trim();
  if (!modelId) return showStatus('empty', 'Enter a model ID');
  showStatus('loading', 'Loading…');
  $('#load-btn').disabled = true;
  try {
    const res = await fetch('/api/model/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_id: modelId }),
    });
    const data = await res.json();
    if (res.ok) {
      showStatus('ready', modelId.split('/').pop());
      connectWS();
    } else {
      showStatus('error', data.detail?.substring(0, 60) || 'Load failed');
    }
  } catch (e) {
    showStatus('error', e.message.substring(0, 60));
  }
  $('#load-btn').disabled = false;
});

$('#unload-btn').addEventListener('click', async () => {
  await fetch('/api/model/unload', { method: 'POST' });
  showStatus('empty', 'No model loaded');
  if (ws) ws.close();
});

// ── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/api/chat`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'chunk') {
      updateLastAssistant(data.content);
    } else if (data.type === 'done') {
      finishStreaming(data.content, data.stats);
    } else if (data.type === 'error') {
      appendMessage('assistant', `❌ ${data.content}`);
      streaming = false;
      toggleInput(true);
    } else if (data.type === 'start') {
      appendMessage('assistant', '');
      streaming = true;
    }
  };
  ws.onclose = () => { ws = null; };
}

// ── Chat UI ──────────────────────────────────────────────────────────────────
function appendMessage(role, content) {
  $('#empty-state')?.remove();
  const container = $('#chat-messages');
  const wrapper = document.createElement('div');
  wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-3`;

  const bubble = document.createElement('div');
  bubble.className = role === 'user'
    ? 'msg-user text-white px-4 py-2.5 rounded-2xl rounded-br-md max-w-[75%] text-sm leading-relaxed'
    : 'bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-2.5 rounded-2xl rounded-bl-md max-w-[75%] text-sm leading-relaxed';
  bubble.setAttribute('data-role', role);

  if (role === 'assistant' && content === '') {
    // Typing indicator
    bubble.innerHTML = '<div class="flex gap-1"><span class="typing-dot w-2 h-2 bg-slate-400 rounded-full inline-block"></span><span class="typing-dot w-2 h-2 bg-slate-400 rounded-full inline-block"></span><span class="typing-dot w-2 h-2 bg-slate-400 rounded-full inline-block"></span></div>';
  } else {
    bubble.textContent = content;
  }

  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function updateLastAssistant(content) {
  const bubbles = document.querySelectorAll('[data-role="assistant"]');
  const last = bubbles[bubbles.length - 1];
  if (last) {
    last.innerHTML = formatMarkdown(content);
    $('#chat-messages').scrollTop = $('#chat-messages').scrollHeight;
  }
}

function finishStreaming(content, stats) {
  updateLastAssistant(content);
  streaming = false;
  toggleInput(true);
  // Add stats badge
  if (stats) {
    const bubbles = document.querySelectorAll('[data-role="assistant"]');
    const last = bubbles[bubbles.length - 1];
    if (last) {
      const badge = document.createElement('div');
      badge.className = 'text-[0.6rem] text-slate-400 mt-1 font-mono';
      badge.textContent = `${stats.words} words · ${stats.time_s}s`;
      last.appendChild(badge);
    }
  }
  // Update history
  history.push({ role: 'assistant', content });
}

function formatMarkdown(text) {
  // Basic markdown: bold, italic, code blocks, inline code
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre class="bg-slate-200 dark:bg-slate-700 rounded-lg p-3 my-2 overflow-x-auto text-xs font-mono"><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code class="bg-slate-200 dark:bg-slate-700 px-1.5 py-0.5 rounded text-xs font-mono">$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function toggleInput(enabled) {
  $('#chat-input').disabled = !enabled;
  $('#send-btn').disabled = !enabled;
}

// ── File Upload ──────────────────────────────────────────────────────────────
$('#file-input').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  files.forEach(f => {
    attachedFiles.push(f);
    const preview = $('#file-preview');
    preview.classList.remove('hidden');
    const tag = document.createElement('span');
    tag.className = 'inline-flex items-center gap-1 px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-[0.65rem] text-slate-600 dark:text-slate-300';
    tag.innerHTML = `📎 ${f.name} <button class="ml-1 text-slate-400 hover:text-red-500" onclick="this.parentElement.remove()">✕</button>`;
    preview.appendChild(tag);
  });
  e.target.value = '';
});

// ── Send Message ─────────────────────────────────────────────────────────────
function sendMessage() {
  const input = $('#chat-input');
  const text = input.value.trim();
  if (!text && attachedFiles.length === 0) return;
  if (streaming) return;

  // Show user message
  let displayText = text;
  if (attachedFiles.length > 0) {
    displayText += (text ? '\n' : '') + attachedFiles.map(f => `📎 ${f.name}`).join('\n');
  }
  appendMessage('user', displayText);
  history.push({ role: 'user', content: text });

  // Clear
  input.value = '';
  input.style.height = 'auto';
  attachedFiles = [];
  $('#file-preview').innerHTML = '';
  $('#file-preview').classList.add('hidden');
  toggleInput(false);

  // Send via WS
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectWS();
    setTimeout(() => sendViaWS(text), 500);
  } else {
    sendViaWS(text);
  }
}

function sendViaWS(text) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    appendMessage('assistant', '⚠️ Not connected. Load a model first.');
    toggleInput(true);
    return;
  }
  ws.send(JSON.stringify({
    message: text,
    history: history.slice(0, -1),
    system_prompt: $('#system-prompt').value,
    temperature: parseFloat($('#temperature').value),
    max_tokens: parseInt($('#max-tokens').value),
  }));
}

$('#send-btn').addEventListener('click', sendMessage);
$('#chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
$('#chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 128) + 'px';
});

// Connect WS on load if model already loaded
fetch('/api/model/status').then(r => r.json()).then(data => {
  if (data.loaded) connectWS();
}).catch(() => {});
</script>
</body>
</html>
